<!DOCTYPE html>
<html>

<head>
<title>Payment</title>
<link rel="stylesheet" href="style.css">
<style>
.cod-btn{
background:#ff9800;
color:white;
padding:10px 18px;
margin:8px;
}

.upi-btn{
background:#673ab7;
color:white;
padding:10px 18px;
margin:8px;
}

.phonepe-btn,
.gpay-btn,
.paytm-btn{
background:#673ab7;
color:white;
padding:8px 15px;
margin:6px;
}

.place-btn{
background:#2ecc71;
color:white;
padding:10px 22px;
font-size:16px;
margin-top:15px;
}
</style>
</head>

<body>

<header>Quick Byte Payment</header>
<h2 style="text-align:center;margin-top:20px;">Choose Payment Method</h2>

<div style="text-align:center;margin-top:30px;">
<button class="cod-btn" onclick="selectPayment('Cash on Delivery')">Cash on Delivery</button>

<button class="upi-btn" onclick="showUPI()">UPI</button>

</div>

<div id="upiOptions" style="display:none;text-align:center;margin-top:20px;">
<button class="phonepe-btn" onclick="selectPayment('PhonePe')">PhonePe</button>

<button class="gpay-btn" onclick="selectPayment('Google Pay')">Google Pay</button>

<button class="paytm-btn" onclick="selectPayment('Paytm')">Paytm</button>
</div>

<br>

<div style="text-align:center;">
<button class="place-btn" onclick="placeOrder()">Place Order</button>
</div>

<h2 id="msg" style="text-align:center;color:green;margin-top:30px;"></h2>
<script>

let paymentMethod="";

function showUPI(){
document.getElementById("upiOptions").style.display="block";
}

function selectPayment(method){
paymentMethod = method;
alert(method + " selected");
}

function placeOrder(){

if(paymentMethod==""){
alert("Please select payment method");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
items: cart,
payment: paymentMethod,
time: new Date().toLocaleTimeString()
});

localStorage.setItem("orders", JSON.stringify(orders));

document.getElementById("msg").innerText="✅ Order Confirmed!";

localStorage.removeItem("cart");

}

</script>
<div style="text-align:center;margin-top:200px;">
<a href="canteens.html">
<button>Back to Home</button>
</a>




<div class="bottom-nav">

<a href="canteens.html">🏠 Home</a>

<a href="cart.html">🛒 Cart</a>

<a href="account.html">👤 Account</a>

</div>




</body>

</html>
